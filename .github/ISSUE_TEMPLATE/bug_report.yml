name: Bug report
description: Report a reproducible XPAM Script issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an XPAM Script issue.

        Before submitting, remove or replace all secrets and private environment details:

        - VLESS links
        - Telegram links
        - Exit VLESS links for DoubleHop
        - UUIDs
        - tokens
        - private keys
        - real domains
        - real IP addresses
        - local backup paths
        - output from `sudo <prefix>-links --show-secrets`

        Use placeholders such as `example.com`, `<server-ip>`, `<prefix>` and `<redacted>`.

  - type: input
    id: version
    attributes:
      label: XPAM version
      description: Run `cat /opt/xpam-script/VERSION` if XPAM is installed.
      placeholder: "1.3.6"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Ubuntu 24.04 LTS
        - Debian 12
        - Other / unknown
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Installation
        - XPAM menu
        - VLESS
        - Telegram proxy / MTG
        - DoubleHop Mode
        - WARP through 3x-ui/Xray
        - Health / deep-health
        - Repair / maintenance
        - Safe self-update
        - Network / DNS / TLS
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide commands or menu steps with secrets redacted.
      placeholder: |
        1. Run `sudo <prefix>-xpam`
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: health
    attributes:
      label: Health output
      description: Paste redacted output from `sudo <prefix>-health` and `sudo <prefix>-health --deep` if relevant.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Paste only redacted logs. Do not include live links, tokens, UUIDs, real domains or real IP addresses.
      render: shell

  - type: checkboxes
    id: safety
    attributes:
      label: Secret check
      options:
        - label: I removed VLESS links, Telegram links, Exit VLESS links, UUIDs, tokens, real domains and real IP addresses.
          required: true
